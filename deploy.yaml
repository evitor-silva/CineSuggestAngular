apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-angular-config
data:
  default.conf: |
    server {
        listen 80;
        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
            try_files $uri $uri/ /index.html;
        }
    }

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: cinesuggest-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cinesuggest-frontend
  template:
    metadata:
      labels:
        app: cinesuggest-frontend
    spec:
      containers:
        - name: frontend
          image: vitoresbr/angular-cinesuggest
          ports:
            - containerPort: 80

          volumeMounts:
            - name: config-volume
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: config-volume
          configMap:
            name: nginx-angular-config

---

apiVersion: v1
kind: Service
metadata:
  name: cinesuggest-front-service
spec:
  selector:
    app: cinesuggest-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
