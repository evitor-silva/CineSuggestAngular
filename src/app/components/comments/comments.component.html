<div class="card bg-dark border-0 p-2">

  <div class="p-1 mb-4 rounded-3 shadow-sm" style="background-color: #1e222b;">
    <form>
      <div class="input-group mb-3">
    <textarea class="form-control border-secondary"
              rows="3"
              placeholder="Coloque seu comentário..."
              style="resize: none; border-color: #2d323f !important;"></textarea>
      </div>

      <div class="d-flex flex-column flex-sm-row align-items-start align-items-sm-center justify-content-between gap-3">

        <button type="button" class="btn btn-danger px-4 fw-bold shadow-sm w-sm-auto" (click)="OnSubmit()">
          Enviar
        </button>

        <div class="w-100 w-sm-auto d-flex justify-content-start justify-content-sm-end">
          <app-rating [rating]="0" class="avaliation-comments"></app-rating>
        </div>

      </div>
    </form>
  </div>

  <div class="px-2">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="text-white mb-0 fw-bold">Avaliações</h5>
      <span class="badge bg-secondary px-3 py-2 rounded-pill">{{ comments ? comments.length : 0 }}</span>
    </div>

    <div *ngIf="comments && comments.length > 0; else noComments">
      <div class="d-flex flex-column gap-3">

        <div *ngFor="let comment of comments" class="p-3 rounded-3 shadow-sm border-start border-danger border-4" style="background-color: #1e222b;">
          <div class="d-flex align-items-center gap-2 mb-2">
            <div class="bg-secondary rounded-circle d-inline-block text-center text-white fw-bold" style="width: 32px; height: 32px; line-height: 32px; font-size: 0.85rem;">
              {{ (comment.author || 'U').charAt(0).toUpperCase() }}
            </div>
            <span class="fw-bold text-danger fs-6">por {{ comment.author || 'Usuário Anônimo' }}</span>
          </div>
          <p class="mb-0 text-light fs-6" style="color: #cbd5e1 !important; word-break: break-word;">
            {{ comment.text || comment }}
          </p>
        </div>

      </div>
    </div>

    <ng-template #noComments>
      <div class="p-4 text-center rounded-3" style="background-color: #1e222b;">
        <p class="text-muted mb-0 fs-6">Nenhum comentário foi encontrado.</p>
      </div>
    </ng-template>
  </div>

</div>
